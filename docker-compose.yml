version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: netrecon-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: netrecon
    volumes:
      - mongo_data:/data/db
    networks:
      - netrecon-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netrecon-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb:27017/netrecon
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
    networks:
      - netrecon-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: netrecon-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    networks:
      - netrecon-network

volumes:
  mongo_data:

networks:
  netrecon-network:
    driver: bridge
